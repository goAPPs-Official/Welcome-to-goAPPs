<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goAPPs | Profile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #041a12;
            --card: #0a3d2a;
            --primary: #00d28d;
            --text: #ffffff;
            --gray: #a0aec0;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .phone-container {
            width: 100%; max-width: 400px; height: 100vh;
            background: linear-gradient(180deg, #062c1e 0%, #041a12 100%);
            margin: auto; position: relative; display: flex; flex-direction: column;
        }

        @media (min-width: 500px) {
            .phone-container { height: 850px; border-radius: 40px; border: 8px solid #1a1a1a; margin-top: 20px; }
        }

        /* --- TOP NAV --- */
        .top-nav { padding: 40px 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-circle { width: 40px; height: 40px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- PROFILE HEADER --- */
        .profile-header { text-align: center; padding: 0 25px 30px; }
        .avatar-container { position: relative; width: 100px; margin: 0 auto 15px; }
        .main-avatar { width: 100px; height: 100px; border-radius: 35% 65% 65% 35% / 30% 30% 70% 70%; border: 3px solid var(--primary); object-fit: cover; }
        .verified-badge { position: absolute; bottom: 0; right: 0; background: var(--primary); color: #062c1e; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 4px solid #062c1e; }
        
        .user-name { font-size: 1.6rem; font-weight: 800; }
        .user-handle { color: var(--primary); font-size: 0.85rem; font-weight: 600; opacity: 0.8; }

        /* --- STATS BAR --- */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 25px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card span { display: block; font-size: 0.6rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .stat-card b { font-size: 1rem; color: var(--primary); }

        /* --- SCROLLABLE CONTENT --- */
        .content-area { flex: 1; overflow-y: auto; padding: 0 25px 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--gray); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1.5px; display: block; }

        /* --- QUICK ACTIONS GRID --- */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .action-item { background: var(--card); padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .action-icon { font-size: 1.5rem; }
        .action-item b { font-size: 0.85rem; }

        /* --- DOCUMENT RECAP --- */
        .vault-summary { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        .vault-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .vault-row:last-child { border-bottom: none; }
        .vault-label { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
        .status-pill { font-size: 0.6rem; padding: 4px 8px; border-radius: 6px; font-weight: 700; }
        .status-pill.success { background: rgba(0, 210, 141, 0.1); color: var(--primary); }
        .status-pill.warn { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }

        /* --- BOTTOM NAV BAR --- */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(10, 61, 42, 0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-link { text-align: center; color: var(--gray); font-size: 0.6rem; text-decoration: none; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="top-nav">
            <div class="back-circle"><span>←</span></div>
            <div class="back-circle"><span>⚙️</span></div>
        </div>

        <div class="profile-header">
            <div class="avatar-container">
                <img src="https://i.pravatar.cc/150?u=goApp" class="main-avatar" alt="User">
                <div class="verified-badge">✓</div>
            </div>
            <h1 class="user-name">Alex Johnson</h1>
            <p class="user-handle">@alex_goapps</p>
        </div>

        <div class="stats-row">
            <div class="stat-card"><b>98%</b><span>Security</span></div>
            <div class="stat-card"><b>12</b><span>Assets</span></div>
            <div class="stat-card"><b>Tier 3</b><span>KYC</span></div>
        </div>

        <div class="content-area">
            <span class="section-label">Quick Actions</span>
            <div class="action-grid">
                <div class="action-item">
                    <span class="action-icon">📂</span>
                    <b>Digital Vault</b>
                </div>
                <div class="action-item">
                    <span class="action-icon">🔗</span>
                    <b>Social Links</b>
                </div>
            </div>

            <span class="section-label">Vault Summary</span>
            <div class="vault-summary">
                <div class="vault-row">
                    <div class="vault-label">🚗 <span>Vehicle Papers</span></div>
                    <span class="status-pill success">VERIFIED</span>
                </div>
                <div class="vault-row">
                    <div class="vault-label">🏠 <span>Rentage Docs</span></div>
                    <span class="status-pill success">VERIFIED</span>
                </div>
                <div class="vault-row">
                    <div class="vault-label">🪪 <span>Driver License</span></div>
                    <span class="status-pill warn">EXPIRING</span>
                </div>
                <div class="vault-row">
                    <div class="vault-label">💎 <span>Land Assets</span></div>
                    <span class="status-pill success">2 FILES</span>
                </div>
            </div>

            <button style="width: 100%; background: var(--glass); border: 1px dashed var(--primary); color: var(--primary); padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer;">
                + Add New Asset
            </button>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-link"><i>🏠</i>Home</a>
            <a href="#" class="nav-link"><i>💳</i>Wallet</a>
            <a href="#" class="nav-link active"><i>👤</i>Profile</a>
        </nav>
    </div>

</body>
</html>
