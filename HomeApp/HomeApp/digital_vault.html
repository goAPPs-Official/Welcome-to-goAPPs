<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goAPPs | Digital Vault Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #041a12;
            --card: #0a3d2a;
            --primary: #00d28d;
            --primary-glow: rgba(0, 210, 141, 0.3);
            --text: #ffffff;
            --gray: #a0aec0;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        .phone-container {
            width: 100%; max-width: 400px; height: 100vh;
            background: #062c1e; margin: auto; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            transition: filter 0.3s ease;
        }
        
        .privacy-filter { filter: blur(40px) brightness(0.5); }

        /* --- HEADER & NAVIGATION --- */
        header { padding: 40px 25px 10px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { font-size: 1.2rem; cursor: pointer; color: var(--primary); }
        .vault-title h2 { font-size: 1.5rem; font-weight: 800; }
        
        .view-toggle {
            display: flex; margin: 15px 25px; background: rgba(0,0,0,0.2);
            border-radius: 12px; padding: 4px;
        }
        .toggle-btn {
            flex: 1; border: none; background: transparent; color: var(--gray);
            padding: 8px; font-size: 0.75rem; font-weight: 700; border-radius: 8px; cursor: pointer;
        }
        .toggle-btn.active { background: var(--card); color: var(--primary); }

        /* --- FILE LIST & CARDS --- */
        .file-list { flex: 1; overflow-y: auto; padding: 10px 25px 100px; }
        .file-card { 
            background: var(--card); border-radius: 20px; padding: 15px;
            display: flex; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .file-thumb { 
            width: 50px; height: 65px; background: #0d4d36; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            position: relative; overflow: hidden;
        }
        .file-thumb::after {
            content: "PDF"; position: absolute; bottom: 0; width: 100%;
            background: var(--danger); color: white; font-size: 0.45rem; text-align: center; font-weight: 800;
        }
        .file-info { flex: 1; }
        .file-info b { font-size: 0.8rem; display: block; }
        .file-info span { font-size: 0.65rem; color: var(--gray); }
        .verify-status { color: var(--primary); font-size: 0.6rem; font-weight: 700; margin-top: 4px; }

        /* --- OVERLAYS & MODALS --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 26, 18, 0.98); z-index: 3000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); padding: 30px; text-align: center;
        }
        .modal-overlay.active { display: flex; }

        /* --- SCANNER & REVIEW --- */
        #upload-overlay { background: #000; display: none; z-index: 4000; position: absolute; top:0; width:100%; height:100%; }
        .scanner-line {
            position: absolute; width: 100%; height: 4px; background: var(--primary);
            box-shadow: 0 0 15px var(--primary); animation: scanMove 2.5s infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        /* --- SECURITY DASHBOARD --- */
        .security-dashboard { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .ring-progress { fill: none; stroke: var(--primary); stroke-width: 8; stroke-dasharray: 283; stroke-dashoffset: 283; transition: 1.5s; }

        /* --- NOTIFICATION --- */
        #push-notification {
            position: absolute; top: -100px; left: 15px; right: 15px;
            background: rgba(10, 61, 42, 0.95); border-radius: 15px; padding: 12px;
            display: flex; align-items: center; gap: 10px; z-index: 6000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #push-notification.active { top: 50px; }

        .fab {
            position: absolute; bottom: 30px; right: 25px;
            width: 56px; height: 56px; background: var(--primary);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 1.8rem; color: #062c1e;
            box-shadow: 0 10px 20px rgba(0, 210, 141, 0.3); z-index: 100;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="push-notification">
            <div style="background:var(--primary); padding:8px; border-radius:8px; color:#000;">⚡</div>
            <div class="push-content">
                <b id="push-title" style="font-size:0.7rem; color:var(--primary);">Security Alert</b>
                <p id="push-msg" style="font-size:0.6rem;">New document secured in vault.</p>
            </div>
        </div>

        <div id="biometric-screen" class="modal-overlay active">
            <div style="width:100px; height:100px; border:2px solid var(--primary); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:2rem;">👤</div>
            <h3>Vault Locked</h3>
            <p style="font-size:0.8rem; color:var(--gray); margin:10px 0 20px;">Identity verification required.</p>
            <button onclick="authenticate()" style="background:var(--primary); border:none; padding:12px 30px; border-radius:10px; font-weight:800;">Authenticate</button>
        </div>

        <header>
            <div class="nav-top">
                <span class="back-btn">← Dashboard</span>
                <span>🔍</span>
            </div>
            <div class="vault-title">
                <h2>Digital Vault</h2>
                <div style="font-size:0.6rem; color:var(--primary); font-weight:800; margin-top:5px;">🔒 AES-256 ENCRYPTED</div>
            </div>
        </header>

        <div class="view-toggle">
            <button class="toggle-btn active" onclick="switchView('files')">Files</button>
            <button class="toggle-btn" onclick="switchView('security')">Security Health</button>
        </div>

        <div id="file-view" class="file-list">
            <div class="file-card">
                <div class="file-thumb">📄</div>
                <div class="file-info">
                    <b>Passport_Identity.pdf</b>
                    <span>Updated 2 days ago • 1.2 MB</span>
                    <div class="verify-status">✓ Verified</div>
                </div>
                <div class="more-options" onclick="openShare()">⋮</div>
            </div>
            </div>

        <div id="security-view" class="file-list" style="display:none;">
            <div class="security-dashboard">
                <div style="text-align:center; position:relative;">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" style="fill:none; stroke:rgba(255,255,255,0.1); stroke-width:8;"></circle>
                        <circle id="scoreRing" cx="50" cy="50" r="45" class="ring-progress"></circle>
                    </svg>
                    <div style="position:absolute; top:35%; width:100%; font-size:1.5rem; font-weight:800;">85%</div>
                </div>
                <p style="text-align:center; font-size:0.7rem; color:var(--gray); margin-top:10px;">Your security is excellent.</p>
            </div>
        </div>

        <div class="fab" onclick="openScanner()">⊕</div>
    </div>

    <div id="upload-overlay">
        <header style="padding:40px;"><h3>Scanner</h3><p onclick="closeScanner()">Close ✕</p></header>
        <div style="flex:1; margin:20px; border:2px dashed var(--primary); position:relative; overflow:hidden;">
            <div class="scanner-line"></div>
        </div>
        <div style="padding:40px; text-align:center;">
            <button onclick="captureDoc()" style="width:60px; height:60px; border-radius:50%; border:4px solid white; background:transparent;"></button>
            <p class="scan-text" style="margin-top:10px;">ALIGN DOCUMENT</p>
        </div>
    </div>

    <script>
        // 1. Biometric Auth
        function authenticate() {
            const btn = document.querySelector('#biometric-screen button');
            btn.innerText = "Scanning...";
            setTimeout(() => {
                document.getElementById('biometric-screen').classList.remove('active');
                triggerPush("Vault Unlocked", "Session active for 30 seconds.");
                startAutoLockTimer();
            }, 1000);
        }

        // 2. View Management
        function switchView(view) {
            document.getElementById('file-view').style.display = view === 'files' ? 'block' : 'none';
            document.getElementById('security-view').style.display = view === 'security' ? 'block' : 'none';
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active'));
            if(view === 'security') animateScore();
        }

        function animateScore() {
            const ring = document.getElementById('scoreRing');
            ring.style.strokeDashoffset = 283 - (283 * 0.85);
        }

        // 3. Scanner Logic
        function openScanner() { document.getElementById('upload-overlay').style.display = 'flex'; }
        function closeScanner() { document.getElementById('upload-overlay').style.display = 'none'; }
        
        function captureDoc() {
            const text = document.querySelector('.scan-text');
            text.innerText = "ENCRYPTING...";
            if(navigator.vibrate) navigator.vibrate(50);
            setTimeout(() => {
                alert("Saved to Vault!");
                closeScanner();
            }, 1000);
        }

        // 4. Notifications
        function triggerPush(title, msg) {
            const push = document.getElementById('push-notification');
            document.getElementById('push-title').innerText = title;
            document.getElementById('push-msg').innerText = msg;
            push.classList.add('active');
            setTimeout(() => push.classList.remove('active'), 3000);
        }

        // 5. Auto-Lock Logic
        let backgroundTime = null;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                backgroundTime = Date.now();
                document.querySelector('.phone-container').classList.add('privacy-filter');
            } else {
                document.querySelector('.phone-container').classList.remove('privacy-filter');
                if (Date.now() - backgroundTime > 30000) {
                    document.getElementById('biometric-screen').classList.add('active');
                }
            }
        });
    </script>
</body>
</html>
