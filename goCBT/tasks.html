<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓goCLASS | My Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --opay-green: #00d28d;
            --opay-gradient: linear-gradient(135deg, #00d28d 0%, #4b44e0 100%);
            --text-dark: #333;
            --text-light: #888;
            --danger: #ff4d4d;
            --bg-gray: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .phone-container {
            width: 375px; height: 750px; background: white; border-radius: 40px;
            overflow: hidden; position: relative; border: 8px solid #333; display: flex; flex-direction: column;
        }

        header { padding: 20px 20px 5px; display: flex; align-items: center; gap: 15px; }
        .back-link { text-decoration: none; font-size: 1.5rem; color: var(--text-dark); font-weight: bold; }

        /* Search & Filter Section */
        .controls { padding: 0 15px 15px; }
        .search-wrapper { position: relative; margin-bottom: 12px; }
        .search-input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px;
            border: 1px solid #eee; background: #f9f9f9; font-size: 0.85rem; outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 12px; color: var(--text-light); }

        .filter-tabs { display: flex; gap: 8px; }
        .filter-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #eee;
            background: white; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--text-light);
        }
        .filter-btn.active { background: var(--opay-green); color: white; border-color: var(--opay-green); }

        .main-scroll { flex: 1; overflow-y: auto; padding: 0 15px 80px; background: var(--bg-gray); position: relative; }

        /* Admin Add Button with Hover State */
        .admin-add-btn {
            position: absolute; bottom: 90px; right: 20px; width: 55px; height: 55px;
            background: var(--opay-gradient); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0, 210, 141, 0.4); border: 2px solid white; 
            cursor: pointer; z-index: 10; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .admin-add-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 20px rgba(75, 68, 224, 0.5);
        }

        /* Task Cards */
        .task-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #eee; }
        .subject-tag { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; background: #f0fff9; color: var(--opay-green); }
        .task-title { font-size: 0.9rem; font-weight: 800; color: var(--text-dark); margin: 8px 0; }
        .task-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #fafafa; }
        .btn-go { background: var(--opay-green); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }

        /* Shared Modal Logic */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 100; backdrop-filter: blur(2px);
        }
        
        /* Iframe Modal for Admin */
        .admin-modal {
            position: absolute; top: 100%; left: 0; width: 100%; height: 90%;
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 102; overflow: hidden; transition: top 0.4s ease;
        }
        .admin-modal.active { top: 10%; }

        /* Task Details Modal */
        .details-modal {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: white; border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 101; padding: 30px 20px; transition: bottom 0.4s ease;
        }
        .details-modal.active { bottom: 0; }
        
        .modal-close { position: absolute; right: 20px; top: 20px; font-size: 1.2rem; cursor: pointer; color: #333; z-index: 105; background: #eee; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .submit-btn {
            display: block; width: 100%; padding: 15px; border-radius: 12px;
            background: var(--opay-gradient); color: white; text-align: center;
            text-decoration: none; font-weight: 800; margin-top: 20px; font-size: 0.9rem;
        }

        iframe { width: 100%; height: 100%; border: none; }

        nav { display: flex; justify-content: space-around; padding: 12px 0; background: white; border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; }
        nav a { text-decoration: none; color: var(--text-light); display: flex; flex-direction: column; align-items: center; flex: 1; font-size: 0.6rem; }
        nav a.active { color: var(--opay-green); }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <a href="index.html" class="back-link">←</a>
        <div style="font-weight: 800; font-size: 1.1rem; flex: 1; text-align: center; margin-right: 25px;">Learning Tasks</div>
    </header>

    <div class="controls">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="Subject, facilitator, or title...">
        </div>
        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterTasks('all')">All</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Done</button>
        </div>
    </div>

    <div class="main-scroll" id="taskContainer">
        <button class="admin-add-btn" title="Add New Task" onclick="openAdminPortal()">+</button>

        <div class="task-card" data-status="pending">
            <span class="subject-tag">MATHEMATICS</span>
            <div class="task-title">Quadratic Equations Practice</div>
            <p style="font-size: 0.7rem; color: var(--text-light);">👨‍🏫 Mr. Adeyemi • SS3 Gold</p>
            <div class="task-footer">
                <span style="font-size: 0.7rem; color: var(--danger); font-weight: 600;">⏰ Due 4:00 PM</span>
                <button class="btn-go" onclick="showDetails('Math Assignment', 'Solve the questions in the linked form. Show your work clearly for maximum tokens.')">Begin</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>

    <div class="admin-modal" id="adminPortal">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfD7uS-fG7k1Y_T-R9uY-L4oA9mS0_0Xw/viewform?embedded=true">Loading…</iframe>
    </div>

    <div class="details-modal" id="taskDetails">
        <div class="modal-close" onclick="closeAllModals()">✕</div>
        <span class="subject-tag">ASSIGNMENT DETAILS</span>
        <h2 id="detailTitle" style="margin: 15px 0 10px; font-size: 1.2rem; color: var(--text-dark);"></h2>
        <p id="detailText" style="font-size: 0.85rem; color: var(--text-light); line-height: 1.6; min-height: 100px;"></p>
        
        <a href="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/viewform" target="_blank" class="submit-btn" onclick="playSuccessSound()">Submit Assignment</a>
    </div>

    <nav>
        <a href="#"><span class="nav-icon">🏧</span>Home</a>
        <a href="#" class="active"><span class="nav-icon">📝</span>Tasks</a>
        <a href="#"><span class="nav-icon">💰</span>Wallet</a>
        <a href="#"><span class="nav-icon">⚙️</span>Settings</a>
    </nav>
</div>

<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script>
    const overlay = document.getElementById('modalOverlay');
    const adminModal = document.getElementById('adminPortal');
    const detailsModal = document.getElementById('taskDetails');

    function openAdminPortal() {
        overlay.style.display = 'block';
        setTimeout(() => adminModal.classList.add('active'), 10);
    }

    function showDetails(title, text) {
        document.getElementById('detailTitle').innerText = title;
        document.getElementById('detailText').innerText = text;
        overlay.style.display = 'block';
        setTimeout(() => detailsModal.classList.add('active'), 10);
    }

    function closeAllModals() {
        adminModal.classList.remove('active');
        detailsModal.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 300);
    }

    function playSuccessSound() {
        document.getElementById('successSound').play();
    }

    function filterTasks(status) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.task-card').forEach(card => {
            card.style.display = (status === 'all' || card.dataset.status === status) ? 'block' : 'none';
        });
    }

    document.querySelector('.search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.task-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    });
</script>

</body>
</html>
