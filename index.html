<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goAPPs by DigitalSolution®</title>
    <style>
        :root {
            --bg-dark: #05080a;
            --accent-cyan: #00f2ff;
            --accent-green: #25D366; 
            --font-main: 'Segoe UI', Roboto, sans-serif;
            --modal-bg: rgba(10, 15, 20, 0.98);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-main);
            color: white; overflow: hidden;
        }

        /* Initial Overlay */
        #interaction-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .init-btn {
            padding: 15px 30px; border: 1px solid var(--accent-cyan);
            background: transparent; color: var(--accent-cyan);
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        /* Main Container */
        .container { display: none; flex-direction: column; align-items: center; width: 350px; text-align: center; }

        /* Logo & Flicker */
        .logo-box { position: relative; margin-bottom: 50px; }
        .logo-img { width: 200px; filter: drop-shadow(0 0 10px var(--accent-cyan)); animation: flicker 3s linear forwards; }
        
        .ring {
            position: absolute; top: -25px; left: -25px; right: -25px; bottom: -25px;
            border: 1px solid rgba(0, 242, 255, 0.05); border-top: 2px solid var(--accent-cyan);
            border-radius: 50%; animation: spin 2s linear infinite; opacity: 0; transition: opacity 1s;
        }

        /* UI Styling */
        .ui-wrapper { width: 100%; position: relative; min-height: 100px; display: flex; flex-direction: column; align-items: center; }
        .progress-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        .status-text { width: 100%; display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #556677; font-family: monospace; }
        
        .info-text { font-size: 0.85rem; color: #94a3b8; line-height: 1.4; margin-top: 10px; opacity: 0; transition: 0.5s; }

        /* CTA Button */
        #cta-button {
            opacity: 0; visibility: hidden;
            padding: 12px 30px; background: transparent;
            border: 1px solid var(--accent-green); color: var(--accent-green);
            text-transform: uppercase; letter-spacing: 2px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        #cta-button:hover { background: var(--accent-green); color: var(--bg-dark); box-shadow: 0 0 20px var(--accent-green); }

        /* Modal & Progress Spinner */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal {
            background: var(--modal-bg); border: 1px solid rgba(37, 211, 102, 0.3);
            padding: 40px 30px; width: 320px; border-radius: 12px;
            text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transform: translateY(20px); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.active { transform: translateY(0); opacity: 1; }
        
        .wa-logo { width: 60px; height: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(37, 211, 102, 0.4)); }
        
        /* Redirect Loader Section */
        #loader-section { display: none; margin-top: 20px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(37, 211, 102, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%; margin: 0 auto 10px;
            animation: spin 0.8s linear infinite;
        }
        .loading-label { font-size: 10px; color: var(--accent-green); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; animation: pulseText 1s ease-in-out infinite; }

        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes flicker {
            0% { opacity: 0; filter: blur(4px) brightness(0.2); }
            10% { opacity: 0.8; filter: blur(0px) brightness(1.5); }
            30% { opacity: 1; filter: brightness(1); }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }
        }

        .is-loaded .progress-bar, .is-loaded .status-text { display: none; }
        .is-loaded .info-text { opacity: 1; }
        .is-loaded #cta-button { opacity: 1; visibility: visible; }
        .is-loaded .ring { opacity: 1; }
    </style>
</head>
<body>

    <div id="interaction-overlay" onclick="startSystem()">
        <button class="init-btn">🚀 Open goAPPs</button>
    </div>

    <div class="container" id="main-ui">
        <div class="logo-box">
            <div class="ring" id="stabilizer-ring"></div>
            <img src="DSA Logo.png" alt="DSA Logo" class="logo-img">
        </div>

        <div class="ui-wrapper" id="ui-container">
            <div class="status-text">
                <span id="msg">Booting System...</span>
                <span id="perc">0%</span>
            </div>
            <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
            <p class="info-text">goAPPs requires connection to WhatsApp to work properly.</p>
            <button id="cta-button" onclick="showModal()">Launch goAPPs</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal" id="modal-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="wa-logo">
            <h2>WhatsApp Link Required</h2>
            <p>Ready to synchronize? We will redirect you to WhatsApp to securely link your account.</p>
            
            <div class="modal-btns" id="modal-actions">
                <button class="modal-btn btn-confirm" onclick="confirmLink()">Connect Now</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">Maybe Later</button>
            </div>

            <div id="loader-section">
                <div class="spinner"></div>
                <div class="loading-label">Linking Device...</div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;

        function startSystem() {
            document.getElementById('interaction-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playEffect([440, 880], 0.1); 

            const duration = 3000;
            const start = performance.now();
            const fill = document.getElementById('fill');
            const perc = document.getElementById('perc');

            function animate(time) {
                let runtime = time - start;
                let progress = Math.min(runtime / duration, 1);
                let percentage = Math.floor(progress * 100);
                fill.style.width = percentage + "%";
                perc.innerText = percentage + "%";

                if (runtime < duration) requestAnimationFrame(animate);
                else document.getElementById('ui-container').classList.add('is-loaded');
            }
            requestAnimationFrame(animate);
        }

        function playSuccessSound() {
            const notes = [523.25, 659.25, 783.99, 987.77]; // C5, E5, G5, B5 (Major 7th Chord)
            notes.forEach((freq, i) => {
                setTimeout(() => playEffect([freq, freq * 1.05], 0.3), i * 80);
            });
        }

        function playEffect(freqs, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freqs[0], audioCtx.currentTime);
            if (freqs[1]) osc.frequency.exponentialRampToValueAtTime(freqs[1], audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        function showModal() {
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            overlay.style.display = 'flex';
            setTimeout(() => box.classList.add('active'), 10);
        }

        function closeModal() {
            document.getElementById('modal-box').classList.remove('active');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
        }

        function confirmLink() {
            playSuccessSound();
            document.getElementById('modal-actions').style.display = 'none';
            document.getElementById('loader-section').style.display = 'block';
            
            setTimeout(() => {
                window.location.href = "https://goapps-official.github.io/Welcome";
            }, 2200); 
        }
    </script>
</body>
</html>
