<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA | System Activation</title>
    <style>
        :root {
            --bg-dark: #05080a;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Overlay to bypass browser audio autoplay restrictions */
        #interaction-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .init-btn {
            padding: 15px 30px;
            border: 1px solid var(--accent-cyan);
            background: transparent;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .init-btn:hover { background: rgba(0, 242, 255, 0.1); }

        .container {
            display: none; /* Hidden until clicked */
            flex-direction: column;
            align-items: center;
            width: 350px;
            animation: logoBloom 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .logo-box {
            position: relative;
            margin-bottom: 50px;
        }

        .logo-img {
            width: 200px;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.2));
        }

        /* Spinning Activation Ring */
        .ring {
            position: absolute;
            top: -25px; left: -25px; right: -25px; bottom: -25px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-top: 2px solid var(--accent-cyan);
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        /* Progress Elements */
        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            margin-top: 15px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 0.1s linear;
        }

        .status-text {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #556677;
            font-family: monospace;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes logoBloom { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="interaction-overlay" onclick="startSystem()">
        <button class="init-btn">Initialize DSA System</button>
    </div>

    <div class="container" id="main-ui">
        <div class="logo-box">
            <div class="ring"></div>
            <img src="DSA Logo White.png" alt="DSA Logo" class="logo-img">
        </div>

        <div class="status-text">
            <span id="msg">System Offline</span>
            <span id="perc">0%</span>
        </div>
        <div class="progress-bar">
            <div id="fill" class="progress-fill"></div>
        </div>
    </div>

    <script>
        function startSystem() {
            // Hide overlay and show UI
            document.getElementById('interaction-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';

            // Play Activation Sound (Synthetic Sine-wave Chime)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5); // Slide to A5
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);

            // 3-Second Loading Logic
            const duration = 3000; // 3 seconds
            const start = performance.now();
            const fill = document.getElementById('fill');
            const perc = document.getElementById('perc');
            const msg = document.getElementById('msg');
            
            const messages = ["Powering Cells", "Syncing Data", "Finalizing"];

            function animate(time) {
                let runtime = time - start;
                let relativeProgress = Math.min(runtime / duration, 1);
                let percentage = Math.floor(relativeProgress * 100);

                fill.style.width = percentage + "%";
                perc.innerText = percentage + "%";

                if (percentage < 40) msg.innerText = messages[0];
                else if (percentage < 80) msg.innerText = messages[1];
                else msg.innerText = messages[2];

                if (runtime < duration) {
                    requestAnimationFrame(animate);
                } else {
                    msg.innerText = "Active";
                    msg.style.color = "#00ff88";
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 500);
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
