<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯goAPPs|DigitalSolution®</title>
    <style>
        :root {
            --bg-dark: #05080a;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
            --font-main: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-main);
            color: white; overflow: hidden;
        }

        /* Initial Overlay */
        #interaction-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .init-btn {
            padding: 15px 30px; border: 1px solid var(--accent-cyan);
            background: transparent; color: var(--accent-cyan);
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        /* Container */
        .container { display: none; flex-direction: column; align-items: center; width: 350px; }

        /* Logo & Flicker */
        .logo-box { position: relative; margin-bottom: 50px; }
        .logo-img { width: 200px; filter: drop-shadow(0 0 10px var(--accent-cyan)); animation: flicker 3s linear forwards; }
        
        .ring {
            position: absolute; top: -25px; left: -25px; right: -25px; bottom: -25px;
            border: 1px solid rgba(0, 242, 255, 0.05); border-top: 2px solid var(--accent-cyan);
            border-radius: 50%; animation: spin 2s linear infinite; opacity: 0; transition: opacity 1s;
        }

        /* Progress & CTA Area */
        .ui-wrapper { width: 100%; position: relative; height: 60px; display: flex; flex-direction: column; align-items: center; }
        
        .progress-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.05); position: absolute; top: 25px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-fill { height: 100%; width: 0%; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }

        .status-text { width: 100%; display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #556677; font-family: monospace; margin-bottom: 5px; }

        /* The CTA Button (Hidden initially) */
        #cta-button {
            opacity: 0;
            visibility: hidden;
            padding: 12px 40px;
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 0px var(--accent-green);
            transform: translateY(10px);
            z-index: 10;
        }
        #cta-button:hover {
            background: var(--accent-green);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--accent-green);
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes flicker {
            0% { opacity: 0; filter: blur(4px) brightness(0.2); }
            10% { opacity: 0.8; filter: blur(0px) brightness(1.5); }
            30% { opacity: 1; filter: brightness(1); }
            60% { opacity: 0.4; }
            100% { opacity: 1; filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }
        }

        /* Class to trigger when loaded */
        .is-loaded .progress-bar { opacity: 0; transform: scaleX(0); }
        .is-loaded .status-text { opacity: 0; }
        .is-loaded #cta-button { opacity: 1; visibility: visible; transform: translateY(-15px); }
        .is-loaded .ring { opacity: 1; }
    </style>
</head>
<body>

    <div id="interaction-overlay" onclick="startSystem()">
        <button class="init-btn">OPEN APP</button>
    </div>

    <div class="container" id="main-ui">
        <div class="logo-box">
            <div class="ring" id="stabilizer-ring"></div>
            <img src="DSA Logo.png" alt="DSA Logo" class="logo-img">
        </div>

        <div class="ui-wrapper" id="ui-container">
            <div class="status-text" id="status-labels">
                <span id="msg">Booting...</span>
                <span id="perc">0%</span>
            </div>
            <div class="progress-bar" id="p-bar">
                <div id="fill" class="progress-fill"></div>
            </div>
            <p>To continue using goAPPs and all its features, please link goAPPs to WhatsApp.</p>
            <button id="cta-button" onclick="launchApp()">Link WhatsApp</button>
        </div>
    </div>

    <script>
        function startSystem() {
            document.getElementById('interaction-overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';

            // Synthetic Chime
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.2);

            // 3-Second Loading
            const duration = 3000;
            const start = performance.now();
            const fill = document.getElementById('fill');
            const perc = document.getElementById('perc');
            const msg = document.getElementById('msg');

            function animate(time) {
                let runtime = time - start;
                let progress = Math.min(runtime / duration, 1);
                let percentage = Math.floor(progress * 100);

                fill.style.width = percentage + "%";
                perc.innerText = percentage + "%";

                if (runtime < duration) {
                    requestAnimationFrame(animate);
                } else {
                    // Transition to CTA state
                    document.getElementById('ui-container').classList.add('is-loaded');
                    document.getElementById('stabilizer-ring').style.opacity = "1";
                }
            }
            requestAnimationFrame(animate);
        }

        function launchApp() {
            // Final click sound
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            
            // Redirect
            setTimeout(() => {
                window.location.href = "https://wa.me/2348157505037?text=Link%20goAPPs";
            }, 200);
        }
    </script>
</body>
</html>
