<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA | Initializing</title>
    <style>
        :root {
            --bg-dark: #0a0f18;
            --accent-blue: #00d2ff;
            --accent-green: #10b981;
            --text-gray: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }

        /* Logo Area */
        .logo-box {
            position: relative;
            margin-bottom: 40px;
        }

        .logo-img {
            width: 180px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            z-index: 2;
            position: relative;
        }

        /* The Spinner Ring */
        .spinner-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        /* Loading Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            transition: width 0.2s linear;
        }

        /* Status Console */
        .status-box {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--text-gray);
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1.2px;
        }

        #loading-message {
            color: var(--accent-green);
            text-transform: uppercase;
        }

        /* Keyframes */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Entrance Animation for the entire container */
        .container {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <div class="spinner-ring"></div>
            <img src="DSA Logo White.png" alt="DSA Logo" class="logo-img">
        </div>

        <div class="status-box">
            <span id="loading-message">Initializing System...</span>
            <span id="percentage">0%</span>
        </div>

        <div class="progress-container">
            <div id="progress-bar" class="progress-fill"></div>
        </div>
    </div>

    <script>
        // Array of dynamic status messages
        const messages = [
            "Initializing System...",
            "Connecting to Cloud...",
            "Optimizing Modules...",
            "Verifying Assets...",
            "Launching Dashboard..."
        ];

        const progressBar = document.getElementById("progress-bar");
        const percentageText = document.getElementById("percentage");
        const statusMessage = document.getElementById("loading-message");

        let progress = 0;

        function updateLoading() {
            // Speed of the loading bar (slightly random for a "natural" feel)
            let increment = Math.random() * 4 + 1;
            progress += increment;

            if (progress >= 100) {
                progress = 100;
                progressBar.style.width = "100%";
                percentageText.innerText = "100%";
                statusMessage.innerText = "Ready!";
                
                // Final delay before redirection
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 800);
                return;
            }

            // Update UI
            progressBar.style.width = progress + "%";
            percentageText.innerText = Math.floor(progress) + "%";

            // Update messages at specific progress milestones
            if (progress > 20 && progress < 45) {
                statusMessage.innerText = messages[1];
            } else if (progress >= 45 && progress < 70) {
                statusMessage.innerText = messages[2];
            } else if (progress >= 70 && progress < 90) {
                statusMessage.innerText = messages[3];
            } else if (progress >= 90) {
                statusMessage.innerText = messages[4];
            }

            // Continue the loop
            requestAnimationFrame(() => {
                setTimeout(updateLoading, 100);
            });
        }

        // Start the loading process
        window.addEventListener('load', () => {
            updateLoading();
        });
    </script>
</body>
</html>
