<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goAPPs | Secure Workspace</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- VARIABLE DEFINITIONS --- */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-sub: #333333;
            --input-border: #dddfe2;
            --brand-primary: #e65100;
            --wa-green: #25D366;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b0b3b8;
            --input-border: #3a3b3c;
            --brand-primary: #ff9800;
            --shadow: rgba(0,0,0,0.5);
        }

        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
        body { background-color: var(--bg-color); overflow: hidden; height: 100vh; color: var(--text-main); }
        .hidden { display: none !important; }

        .theme-switch {
            position: fixed; top: 20px; right: 20px; z-index: 10001;
            background: var(--card-bg); border: 1px solid var(--input-border);
            padding: 10px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow); color: var(--brand-primary);
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
        }
        .slideshow { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -2; }
        .slide {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            animation: fadeSlider 12s infinite; opacity: 0;
        }
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1518655061766-48c34baaff57?auto=format&fit=crop&w=1350&q=80'); }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1350&q=80'); animation-delay: 4s; }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1350&q=80'); animation-delay: 8s; }

        @keyframes fadeSlider { 0%, 45% { opacity: 0; } 15%, 33% { opacity: 1; } }
        .overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255, 111, 0, 0.7), rgba(103, 58, 183, 0.7)); z-index: -1; }
        
        #timer-display { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; opacity: 0.9; }
        .progress-container { width: 250px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 10px auto; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #fff; transition: width 0.1s linear; }

        /* --- LOGIN PAGE --- */
        #login-page { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; }
        .login-wrapper { display: flex; max-width: 1000px; width: 100%; padding: 20px; align-items: center; }
        .brand-text { flex: 1; padding-right: 50px; }
        .brand-text h1 { color: var(--brand-primary); font-size: 3.5rem; font-weight: 800; }
        
        .login-card { width: 400px; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px var(--shadow); text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1rem; background: var(--card-bg); color: var(--text-main); }
        
        .btn-login { width: 100%; padding: 14px; background: var(--brand-primary); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .forgot-link { color: var(--brand-primary); text-decoration: none; font-size: 0.9rem; display: block; margin: 15px 0; cursor: pointer; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .social-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--input-border); cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--card-bg); color: var(--text-main); text-decoration: none; }
        
        .btn-wa-cta { background: var(--wa-green) !important; color: white !important; border: none; grid-column: span 2; font-size: 1.1rem; }
        .btn-new { background: #42b72a; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); margin: 5% auto; width: 90%; max-width: 500px; border-radius: 12px; position: relative; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .modal-content.large { max-width: 600px; height: 85vh; padding: 10px; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 1.5rem; cursor: pointer; color: var(--text-main); }
        
        iframe { width: 100%; height: calc(100% - 40px); border: none; }

        @media (max-width: 850px) { .login-wrapper { flex-direction: column; text-align: center; } .brand-text { padding-right: 0; margin-bottom: 25px; } }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-switch" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-sun"></i></button>

    <div id="splash-screen">
        <div class="slideshow">
            <div class="slide"></div><div class="slide"></div><div class="slide"></div>
        </div>
        <div class="overlay"></div>
        <div class="splash-content">
            <h1>goAPPs</h1>
            <div id="timer-display">Initializing in 5s...</div>
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
            <p id="status-text">Synchronizing Dark Preferences...</p>
        </div>
    </div>

    <div id="login-page" class="hidden">
        <div class="login-wrapper">
            <div class="brand-text">
                <h1>goAPPs</h1>
                <p>Welcome to the future of connectivity.</p>
            </div>
            
            <div class="login-card">
                <input type="text" id="login-user" placeholder="Email or phone number">
                <input type="password" placeholder="Password">
                <button class="btn-login">Log In</button>
                <span class="forgot-link" onclick="toggleForgotModal(true)">Forgotten password?</span>
                <hr>
                <div class="social-grid">
                    <a href="#" id="wa-auth-link" class="social-btn btn-wa-cta">
                        <i class="fab fa-whatsapp"></i> WhatsApp Login
                    </a>
                    <button class="social-btn"><i class="fab fa-google" style="color: #EA4335;"></i> Google</button>
                    <button class="social-btn" style="color: #007AFF;" onclick="alert('FaceID initialized...')"><i class="fas fa-face-id"></i> FaceID</button>
                </div>
                <hr>
                <button class="btn-new" onclick="toggleRegModal(true)">Create New Account</button>
            </div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content large">
            <span class="close-btn" onclick="toggleRegModal(false)">&times;</span>
            <iframe id="google-form-iframe" src="about:blank"></iframe>
        </div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleForgotModal(false)">&times;</span>
            <h2 style="margin-bottom: 10px; color: var(--brand-primary);">Account Recovery</h2>
            <p style="color: var(--text-sub); margin-bottom: 20px;">Enter your email to receive a recovery code.</p>
            <input type="text" id="forgot-input" placeholder="Email address" style="width: 100%; padding: 14px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--card-bg); color: var(--text-main);">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button onclick="toggleForgotModal(false)" style="padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button onclick="alert('Recovery email sent!')" style="padding: 10px 20px; border: none; border-radius: 6px; background: var(--brand-primary); color: white; cursor: pointer; font-weight: bold;">Submit</button>
            </div>
        </div>
    </div>

    <script>
        // --- SETTINGS ---
        const WA_PHONE = "1234567890"; 
        const WA_MSG = "I am ready to authenticate with goAPPs.";
        const FORM_URL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform";
        const EMAIL_FIELD = "entry.123456789";

        // Initialize WA Link
        document.getElementById('wa-auth-link').href = `https://wa.me/${WA_PHONE}?text=${encodeURIComponent(WA_MSG)}`;

        // Theme
        function toggleTheme() {
            const b = document.body;
            const icon = document.getElementById('theme-icon');
            const isDark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.className = isDark ? "fas fa-moon" : "fas fa-sun";
        }

        // Countdown & Splash
        let timeLeft = 5;
        const bar = document.getElementById('bar');
        const timerText = document.getElementById('timer-display');
        
        const splashTimer = setInterval(() => {
            timeLeft--;
            timerText.innerText = `Initializing in ${timeLeft}s...`;
            
            // Sync bar progress (20% per second for 5 seconds)
            bar.style.width = ((5 - timeLeft) * 20) + '%';

            if (timeLeft <= 0) {
                clearInterval(splashTimer);
                document.getElementById('splash-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('splash-screen').classList.add('hidden');
                    document.getElementById('login-page').classList.remove('hidden');
                }, 500);
            }
        }, 1000);

        // Modals
        function toggleRegModal(show) {
            const m = document.getElementById('regModal');
            const f = document.getElementById('google-form-iframe');
            const email = document.getElementById('login-user').value;
            if (show) {
                let url = `${FORM_URL}?embedded=true`;
                if (email) url += `&${EMAIL_FIELD}=${encodeURIComponent(email)}`;
                f.src = url;
                m.style.display = 'block';
            } else {
                m.style.display = 'none';
                f.src = "about:blank";
            }
        }

        function toggleForgotModal(show) {
            document.getElementById('forgotModal').style.display = show ? 'block' : 'none';
        }

        window.onclick = (e) => { if (e.target.className === 'modal') { toggleRegModal(false); toggleForgotModal(false); } }
    </script>
</body>
</html>
